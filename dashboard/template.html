<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SteerCode — {{PROJECT_NAME}}</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script src="data.js"></script>
<style>{{CSS}}</style>
</head>
<body>

<div class="header">
  <h1>🔍 SteerCode</h1>
  <div class="stats">
    <span id="stat-files">0 files</span>
    <span id="stat-functions">0 functions</span>
    <span id="stat-classes">0 classes</span>
    <span id="stat-edges">0 connections</span>
    <span id="stat-langs">0 languages</span>
  </div>
  <select id="lang-select" onchange="switchLang(this.value)" style="padding:4px 8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:12px;cursor:pointer">
    <option value="en">EN</option><option value="ko">한국어</option><option value="zh">中文</option><option value="ja">日本語</option><option value="es">ES</option>
  </select>
  <div class="search-box">
    <svg viewBox="0 0 16 16"><path d="M11.5 7a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm-.82 4.74a6 6 0 1 1 1.06-1.06l3.04 3.04a.75.75 0 1 1-1.06 1.06l-3.04-3.04Z"/></svg>
    <input type="text" id="search-input" placeholder="Search nodes... (Ctrl+K)" autocomplete="off">
    <div class="search-results" id="search-results"></div>
  </div>
</div>
<div id="banner-area"></div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <h2 data-i18n="layers">Layers</h2>
    <div class="layer-list" id="layer-list"></div>
    <div class="filter-section">
      <h2 style="padding:0 0 8px" data-i18n="show">Show</h2>
      <label><input type="checkbox" id="filter-file" data-filter="file" checked> <span data-i18n="files">Files</span></label>
      <label><input type="checkbox" id="filter-function" data-filter="function"> <span data-i18n="functions">Functions</span></label>
      <label><input type="checkbox" id="filter-class" data-filter="class"> <span data-i18n="classes">Classes</span></label>
    </div>
    <div class="filter-section">
      <h2 style="padding:0 0 8px" data-i18n="complexity">Complexity</h2>
      <label><input type="checkbox" class="complexity-cb" data-complexity="complex" checked> <span data-i18n="complex">Complex</span></label>
      <label><input type="checkbox" class="complexity-cb" data-complexity="moderate" checked> <span data-i18n="moderate">Moderate</span></label>
      <label><input type="checkbox" class="complexity-cb" data-complexity="simple" checked> <span data-i18n="simple">Simple</span></label>
    </div>
    <div class="filter-section">
      <h2 style="padding:0 0 8px" data-i18n="language">Language</h2>
      <div id="lang-list" style="max-height:150px;overflow-y:auto"></div>
    </div>
    <div class="filter-section">
      <h2 style="padding:0 0 8px" data-i18n="maxNodes">Max Nodes</h2>
      <select id="node-limit" style="width:100%;padding:4px 8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:12px">
        <option value="200">200</option>
        <option value="500" selected>500</option>
        <option value="1000">1,000</option>
        <option value="2000">2,000</option>
        <option value="5000">5,000</option>
        <option value="0">All (may be slow)</option>
      </select>
    </div>
  </div>

  <div class="graph-container">
    <div id="graph"></div>
    <div id="node-limit-info" class="node-limit-info" style="display:none"></div>
    <div class="graph-controls">
      <button onclick="network.fit()" title="Fit to view">⊞</button>
      <button onclick="network.moveTo({scale:network.getScale()*1.3})" title="Zoom in">+</button>
      <button onclick="network.moveTo({scale:network.getScale()/1.3})" title="Zoom out">−</button>
      <button id="btn-toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
    </div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <button class="dp-close" onclick="closeDetail()">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>{{I18N}}</script>
<script>{{JS}}</script>
</body>
</html>
