<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SteerCode — {{PROJECT_NAME}}</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script src="data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#d29922;--red:#f85149;--purple:#bc8cff;--pink:#f778ba;--cyan:#39d2c0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}
.header{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.header h1{font-size:16px;font-weight:600;white-space:nowrap}
.header .stats{display:flex;gap:8px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.header .stats span{background:var(--surface2);padding:3px 10px;border-radius:12px}
.search-box{margin-left:auto;position:relative;width:280px}
.search-box input{width:100%;padding:6px 12px 6px 32px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:var(--text2)}
.search-results{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-top:4px;max-height:300px;overflow-y:auto;z-index:100;display:none}
.search-results.active{display:block}
.search-results .sr-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.search-results .sr-item:hover{background:var(--surface2)}
.sr-type{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;text-transform:uppercase}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar.collapsed{width:0;min-width:0;border:none}
.sidebar h2{font-size:13px;font-weight:600;padding:12px 16px 8px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.layer-list{flex:1;overflow-y:auto;padding:0 8px 8px}
.layer-item{padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:2px;transition:background .15s}
.layer-item:hover{background:var(--surface2)}
.layer-item.active{background:var(--surface2);font-weight:600}
.layer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.layer-count{margin-left:auto;font-size:11px;color:var(--text2);background:var(--bg);padding:1px 6px;border-radius:8px}
.filter-section{padding:8px 16px;border-top:1px solid var(--border)}
.filter-section label{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;cursor:pointer;padding:3px 0}
.filter-section input[type=checkbox]{accent-color:var(--accent)}
.graph-container{flex:1;position:relative}
#graph{width:100%;height:100%}
.graph-controls{position:absolute;bottom:16px;right:16px;display:flex;gap:6px}
.graph-controls button{background:var(--surface);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.graph-controls button:hover{background:var(--surface2)}
.detail-panel{width:360px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;display:none;padding:20px}
.detail-panel.active{display:block}
.detail-panel .dp-close{float:right;background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:0 4px}
.detail-panel .dp-close:hover{color:var(--text)}
.dp-type{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;text-transform:uppercase;display:inline-block;margin-bottom:8px}
.dp-name{font-size:18px;font-weight:700;margin-bottom:4px;word-break:break-all}
.dp-path{font-size:12px;color:var(--text2);margin-bottom:12px;word-break:break-all}
.dp-summary{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5}
.dp-section{margin-bottom:16px}
.dp-section h3{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.dp-tag{display:inline-block;font-size:11px;padding:2px 8px;background:var(--surface2);border-radius:4px;margin:2px 4px 2px 0;color:var(--text2)}
.dp-edge{font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;cursor:pointer}
.dp-edge:hover{color:var(--accent)}
.dp-edge-type{font-size:10px;padding:1px 5px;border-radius:3px;background:var(--surface2);color:var(--text2)}
.dp-complexity{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px}
.dp-complexity.simple{background:#1a3a2a;color:var(--green)}
.dp-complexity.moderate{background:#3a2f1a;color:var(--orange)}
.dp-complexity.complex{background:#3a1a1a;color:var(--red)}
.type-file{background:#1a2a3a;color:var(--accent)}
.type-function{background:#1a3a2a;color:var(--green)}
.type-class{background:#2a1a3a;color:var(--purple)}
.type-module{background:#3a2a1a;color:var(--orange)}
.layer-api{background:var(--accent)}.layer-ui{background:var(--pink)}.layer-service{background:var(--green)}.layer-data{background:var(--orange)}.layer-infra{background:var(--purple)}.layer-test{background:var(--cyan)}.layer-docs{background:var(--text2)}
.vis-tooltip{background:var(--surface)!important;border:1px solid var(--border)!important;color:var(--text)!important;border-radius:6px!important;padding:8px 12px!important;font-size:12px!important;box-shadow:0 4px 12px rgba(0,0,0,.4)!important}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.banner{padding:8px 20px;font-size:12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.banner-warn{background:#2d1b00;color:var(--orange)}
.banner button{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.banner button:hover{background:var(--border)}
.node-limit-info{position:absolute;top:12px;left:12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 14px;font-size:12px;color:var(--text2);z-index:10}
</style>
</head>
<body>

<div class="header">
  <h1>🔍 SteerCode</h1>
  <div class="stats">
    <span id="stat-files">0 files</span>
    <span id="stat-functions">0 functions</span>
    <span id="stat-classes">0 classes</span>
    <span id="stat-edges">0 connections</span>
    <span id="stat-langs">0 languages</span>
  </div>
  <div class="search-box">
    <svg viewBox="0 0 16 16"><path d="M11.5 7a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm-.82 4.74a6 6 0 1 1 1.06-1.06l3.04 3.04a.75.75 0 1 1-1.06 1.06l-3.04-3.04Z"/></svg>
    <input type="text" id="search-input" placeholder="Search nodes... (Ctrl+K)" autocomplete="off">
    <div class="search-results" id="search-results"></div>
  </div>
</div>
<div id="banner-area"></div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <h2>Layers</h2>
    <div class="layer-list" id="layer-list"></div>
    <div class="filter-section">
      <h2 style="padding:0 0 8px">Show</h2>
      <label><input type="checkbox" id="filter-file" data-filter="file" checked> Files</label>
      <label><input type="checkbox" id="filter-function" data-filter="function"> Functions</label>
      <label><input type="checkbox" id="filter-class" data-filter="class"> Classes</label>
    </div>
    <div class="filter-section">
      <h2 style="padding:0 0 8px">Max Nodes</h2>
      <select id="node-limit" style="width:100%;padding:4px 8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:12px">
        <option value="200">200</option>
        <option value="500" selected>500</option>
        <option value="1000">1,000</option>
        <option value="2000">2,000</option>
        <option value="5000">5,000</option>
        <option value="0">All (may be slow)</option>
      </select>
    </div>
  </div>

  <div class="graph-container">
    <div id="graph"></div>
    <div id="node-limit-info" class="node-limit-info" style="display:none"></div>
    <div class="graph-controls">
      <button onclick="network.fit()" title="Fit to view">⊞</button>
      <button onclick="network.moveTo({scale:network.getScale()*1.3})" title="Zoom in">+</button>
      <button onclick="network.moveTo({scale:network.getScale()/1.3})" title="Zoom out">−</button>
      <button id="btn-toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
    </div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <button class="dp-close" onclick="closeDetail()">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
const nodes = GRAPH_DATA.nodes;
const edges = GRAPH_DATA.edges;
const layers = GRAPH_DATA.layers;
const project = GRAPH_DATA.project;

// ─── Large graph detection ───
const IS_LARGE = nodes.length > 1000;
const MAX_NODE_DEFAULT = IS_LARGE ? 500 : 0;

// Auto-configure for large graphs: only show files by default
if (IS_LARGE) {
  document.getElementById('filter-function').checked = false;
  document.getElementById('filter-class').checked = false;
  document.getElementById('banner-area').innerHTML =
    '<div class="banner banner-warn">⚡ Large graph (' + nodes.length.toLocaleString() +
    ' nodes). Showing files only with limit. Enable functions/classes in sidebar filters.</div>';
} else {
  document.getElementById('filter-function').checked = true;
  document.getElementById('filter-class').checked = true;
}

// ─── Color Maps ───
const TYPE_COLORS = {file:'#58a6ff',function:'#3fb950',class:'#bc8cff',module:'#d29922'};
const TYPE_SHAPES = {file:'dot',function:'diamond',class:'triangle',module:'square'};
const LAYER_COLORS = {api:'#58a6ff',ui:'#f778ba',service:'#3fb950',data:'#d29922',infra:'#bc8cff',test:'#39d2c0',docs:'#8b949e'};
const EDGE_COLORS = {contains:'#30363d',imports:'#58a6ff',calls:'#3fb950',inherits:'#bc8cff',implements:'#d29922'};

const nodeLayerMap = {};
layers.forEach(l => l.node_ids.forEach(id => { nodeLayerMap[id] = l.id; }));

// ─── Stats ───
document.getElementById('stat-files').textContent = nodes.filter(n=>n.type==='file').length.toLocaleString() + ' files';
document.getElementById('stat-functions').textContent = nodes.filter(n=>n.type==='function').length.toLocaleString() + ' functions';
document.getElementById('stat-classes').textContent = nodes.filter(n=>n.type==='class').length.toLocaleString() + ' classes';
document.getElementById('stat-edges').textContent = edges.length.toLocaleString() + ' connections';
const langs = new Set(nodes.map(n=>n.language).filter(Boolean));
document.getElementById('stat-langs').textContent = langs.size + ' languages';

// ─── Layer Sidebar ───
const layerListEl = document.getElementById('layer-list');
let activeLayer = null;

function renderLayers() {
  layerListEl.innerHTML = '<div class="layer-item' + (activeLayer===null?' active':'') + '" onclick="filterLayer(null)"><div class="layer-dot" style="background:var(--text)"></div>All<span class="layer-count">' + nodes.length.toLocaleString() + '</span></div>';
  layers.forEach(l => {
    layerListEl.innerHTML += '<div class="layer-item' + (activeLayer===l.id?' active':'') + '" onclick="filterLayer(\'' + l.id + '\')"><div class="layer-dot layer-' + l.id + '"></div>' + l.name + '<span class="layer-count">' + l.node_ids.length.toLocaleString() + '</span></div>';
  });
}
renderLayers();

// ─── Vis Network ───
const nodeIdMap = {};
nodes.forEach(n => { nodeIdMap[n.id] = n; });

function getNodeColor(n) {
  const lid = nodeLayerMap[n.id];
  if (lid && LAYER_COLORS[lid]) return LAYER_COLORS[lid];
  return TYPE_COLORS[n.type] || '#8b949e';
}

function getActiveFilters() {
  const f = new Set();
  document.querySelectorAll('[data-filter]').forEach(cb => { if (cb.checked) f.add(cb.dataset.filter); });
  return f;
}

function getNodeLimit() {
  return parseInt(document.getElementById('node-limit').value) || 0;
}

function buildVisNodes(filterTypes, filterLayerId, limit) {
  let filtered = nodes.filter(n => {
    if (!filterTypes.has(n.type)) return false;
    if (filterLayerId && !layers.find(l=>l.id===filterLayerId)?.node_ids.includes(n.id)) return false;
    return true;
  });
  const total = filtered.length;
  if (limit > 0 && filtered.length > limit) {
    // Prioritize: complex > moderate > simple, classes > functions > files
    const typePrio = {class:3, function:2, file:1};
    const compPrio = {complex:3, moderate:2, simple:1};
    filtered.sort((a,b) => (compPrio[b.complexity]||0) - (compPrio[a.complexity]||0) || (typePrio[b.type]||0) - (typePrio[a.type]||0));
    filtered = filtered.slice(0, limit);
  }
  // Show limit info
  const info = document.getElementById('node-limit-info');
  if (limit > 0 && total > limit) {
    info.textContent = `Showing ${limit.toLocaleString()} of ${total.toLocaleString()} nodes`;
    info.style.display = 'block';
  } else {
    info.style.display = 'none';
  }
  return filtered.map(n => {
    const color = getNodeColor(n);
    // Bigger nodes when fewer visible
    const scale = filtered.length < 20 ? 2 : filtered.length < 100 ? 1.5 : 1;
    const size = (n.type === 'file' ? 12 : n.type === 'class' ? 16 : 10) * scale;
    const fontSize = Math.round(10 * scale);
    return {
      id: n.id, label: n.name, title: n.summary + '\n' + n.file_path,
      color: {background:color, border:color, highlight:{background:color,border:'#fff'}},
      shape: TYPE_SHAPES[n.type] || 'dot', size: size,
      font: {color:'#e6edf3', size:fontSize, face:'-apple-system,sans-serif'},
    };
  });
}

function buildVisEdges(visibleIds) {
  const idSet = new Set(visibleIds);
  return edges.filter(e => idSet.has(e.source) && idSet.has(e.target)).map((e,i) => ({
    id: e.source+'_'+e.target+'_'+e.type, from: e.source, to: e.target,
    color: {color: EDGE_COLORS[e.type]||'#444c56', opacity:0.7, highlight:EDGE_COLORS[e.type]||'#58a6ff'},
    arrows: e.type !== 'contains' ? {to:{enabled:true,scaleFactor:0.6}} : undefined,
    smooth: {type:'continuous'},
    width: e.type === 'contains' ? 0.8 : e.type === 'imports' ? 2 : 1.5,
  }));
}

// Pre-build adjacency index for fast neighbor lookup
const adjIndex = {};
edges.forEach(e => {
  if (!adjIndex[e.source]) adjIndex[e.source] = [];
  if (!adjIndex[e.target]) adjIndex[e.target] = [];
  adjIndex[e.source].push(e);
  adjIndex[e.target].push(e);
});

let visNodes, visEdges, network;
let expandedNodes = new Set(); // track which nodes have been "expanded"

function makeVisNode(n) {
  const color = getNodeColor(n);
  const size = n.type === 'file' ? 12 : n.type === 'class' ? 16 : 10;
  return {
    id: n.id, label: n.name, title: n.summary + '\n' + n.file_path,
    color: {background:color, border:color, highlight:{background:color,border:'#fff'}},
    shape: TYPE_SHAPES[n.type] || 'dot', size: size,
    font: {color:'#e6edf3', size:10, face:'-apple-system,sans-serif'},
  };
}

function expandNode(id) {
  if (expandedNodes.has(id)) return;
  expandedNodes.add(id);

  const neighborEdges = adjIndex[id] || [];
  const newNodes = [];
  const newEdges = [];

  neighborEdges.forEach(e => {
    const neighborId = e.source === id ? e.target : e.source;
    const neighborData = nodeIdMap[neighborId];
    if (!neighborData) return;

    if (!visNodes.get(neighborId)) {
      const vn = makeVisNode(neighborData);
      const pos = network.getPosition(id);
      if (pos) {
        vn.x = pos.x + (Math.random() - 0.5) * 200;
        vn.y = pos.y + (Math.random() - 0.5) * 200;
      }
      newNodes.push(vn);
    }

    const edgeId = e.source+'_'+e.target+'_'+e.type;
    if (!visEdges.get(edgeId)) {
      newEdges.push({
        id: edgeId, from: e.source, to: e.target,
        color: {color: EDGE_COLORS[e.type]||'#444c56', opacity:0.7, highlight:EDGE_COLORS[e.type]||'#58a6ff'},
        arrows: e.type !== 'contains' ? {to:{enabled:true,scaleFactor:0.6}} : undefined,
        smooth: {type:'continuous'},
        width: e.type === 'contains' ? 0.8 : e.type === 'imports' ? 2 : 1.5,
      });
    }
  });

  // Batch add — single re-render
  if (newNodes.length) visNodes.add(newNodes);
  if (newEdges.length) visEdges.add(newEdges);

  const info = document.getElementById('node-limit-info');
  info.textContent = `${visNodes.length} nodes, ${visEdges.length} edges (click to explore)`;
  info.style.display = 'block';
}

function refreshGraph() {
  const filters = getActiveFilters();
  const limit = getNodeLimit();
  const vn = buildVisNodes(filters, activeLayer, limit);
  expandedNodes = new Set();

  // For large graphs: start with NO edges, expand on click
  const nodeCount = vn.length;
  const usePhysics = nodeCount <= 2000;
  // Show edges when filtered view is small enough, hide for large views
  const startClean = nodeCount > 1000;

  if (!usePhysics) {
    vn.forEach((n, i) => {
      const angle = i * 0.3;
      const r = 30 + i * 2;
      n.x = r * Math.cos(angle);
      n.y = r * Math.sin(angle);
    });
  }

  visNodes = new vis.DataSet(vn);
  // Small graphs: show all edges. Large graphs: start empty, expand on click
  const ids = vn.map(n=>n.id);
  visEdges = new vis.DataSet(startClean ? [] : buildVisEdges(ids));

  if (network) network.destroy();
  network = new vis.Network(document.getElementById('graph'), {nodes:visNodes,edges:visEdges}, {
    physics: usePhysics ? {
      solver: 'forceAtlas2Based',
      forceAtlas2Based: {gravitationalConstant: nodeCount > 500 ? -20 : -40, centralGravity:0.005, springLength: nodeCount > 500 ? 80 : 120, springConstant:0.05, damping:0.4},
      stabilization: {iterations: nodeCount > 500 ? 80 : 150, fit:true},
    } : false,
    interaction: {hover:true, tooltipDelay:200, zoomView:true, dragView:true},
    layout: {improvedLayout: nodeCount < 300},
    edges: {smooth: {type:'continuous'}},
  });
  if (!usePhysics) setTimeout(() => network.fit(), 100);

  if (startClean) {
    const info = document.getElementById('node-limit-info');
    info.textContent = `${vn.length} nodes (click any node to explore connections)`;
    info.style.display = 'block';
  }

  network.on('click', function(p) {
    if (p.nodes.length > 0) {
      expandNode(p.nodes[0]);
      showDetail(p.nodes[0]);
    } else {
      closeDetail();
    }
  });
  network.on('doubleClick', function(p) {
    if (p.nodes.length > 0) network.focus(p.nodes[0], {scale:1.5, animation:true});
  });
}
refreshGraph();

// ─── Filters ───
document.querySelectorAll('[data-filter]').forEach(cb => {
  cb.addEventListener('change', () => refreshGraph());
});
document.getElementById('node-limit').addEventListener('change', () => refreshGraph());

function filterLayer(lid) {
  activeLayer = lid;
  renderLayers();
  refreshGraph();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ─── Search (debounced for large graphs) ───
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
let searchTimer = null;

// Pre-build search index for fast lookup
const searchIndex = nodes.map(n => ({
  id: n.id, type: n.type, name: n.name,
  path: n.file_path || '',
  searchText: (n.name + ' ' + (n.file_path||'')).toLowerCase(),
}));

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.toLowerCase().trim();
  if (!q) { searchResults.classList.remove('active'); return; }
  searchTimer = setTimeout(() => {
    const matches = searchIndex.filter(n => n.searchText.includes(q)).slice(0, 30);
    if (!matches.length) {
      searchResults.innerHTML = '<div class="sr-item" style="color:var(--text2)">No results for "' + q + '"</div>';
      searchResults.classList.add('active');
      return;
    }
    searchResults.innerHTML = matches.map(n =>
      '<div class="sr-item" onmousedown="focusNode(\'' + n.id + '\')"><span class="sr-type type-' + n.type + '">' + n.type + '</span>' + n.name + '<span style="margin-left:auto;font-size:11px;color:var(--text2)">' + n.path.split('/').pop() + '</span></div>'
    ).join('');
    searchResults.classList.add('active');
  }, IS_LARGE ? 150 : 0);
});

searchInput.addEventListener('blur', () => setTimeout(()=>searchResults.classList.remove('active'), 300));
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key === 'k') { e.preventDefault(); searchInput.focus(); searchInput.select(); }
  if (e.key === 'Escape') { searchInput.blur(); searchResults.classList.remove('active'); closeDetail(); }
});

function focusNode(id) {
  searchResults.classList.remove('active');
  searchInput.value = '';
  // If node not in current view, temporarily add it
  if (!visNodes.get(id)) {
    const n = nodeIdMap[id];
    if (n) visNodes.add(makeVisNode(n));
  }
  expandNode(id);
  network.selectNodes([id]);
  network.focus(id, {scale:1.2, animation:true});
  showDetail(id);
}

// ─── Detail Panel ───
function showDetail(id) {
  const n = nodeIdMap[id];
  if (!n) return;
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  const incoming = edges.filter(e => e.target === id);
  const outgoing = edges.filter(e => e.source === id);
  const layer = layers.find(l => l.node_ids.includes(id));

  let html = '<span class="dp-type type-' + n.type + '">' + n.type + '</span>';
  if (layer) html += ' <span class="dp-type layer-' + layer.id + '" style="color:#fff">' + layer.name + '</span>';
  html += '<div class="dp-name">' + n.name + '</div>';
  if (n.file_path) html += '<div class="dp-path">📁 ' + n.file_path;
  if (n.line_range && n.line_range[0]) html += ':' + n.line_range[0] + '-' + n.line_range[1];
  html += '</div>';
  html += '<div class="dp-summary">' + n.summary + '</div>';
  html += '<span class="dp-complexity ' + n.complexity + '">' + n.complexity + '</span>';

  if (n.tags && n.tags.length) {
    html += '<div class="dp-section"><h3>Tags</h3>' + n.tags.map(t=>'<span class="dp-tag">' + t + '</span>').join('') + '</div>';
  }
  if (incoming.length) {
    html += '<div class="dp-section"><h3>Incoming (' + incoming.length + ')</h3>';
    incoming.slice(0,30).forEach(e => {
      const src = nodeIdMap[e.source];
      if (src) html += '<div class="dp-edge" onclick="focusNode(\'' + e.source + '\')"><span class="dp-edge-type">' + e.type + '</span> ← ' + src.name + '</div>';
    });
    if (incoming.length > 30) html += '<div style="font-size:11px;color:var(--text2);padding:4px 0">...and ' + (incoming.length-30) + ' more</div>';
    html += '</div>';
  }
  if (outgoing.length) {
    html += '<div class="dp-section"><h3>Outgoing (' + outgoing.length + ')</h3>';
    outgoing.slice(0,30).forEach(e => {
      const tgt = nodeIdMap[e.target];
      if (tgt) html += '<div class="dp-edge" onclick="focusNode(\'' + e.target + '\')"><span class="dp-edge-type">' + e.type + '</span> → ' + tgt.name + '</div>';
    });
    if (outgoing.length > 30) html += '<div style="font-size:11px;color:var(--text2);padding:4px 0">...and ' + (outgoing.length-30) + ' more</div>';
    html += '</div>';
  }
  content.innerHTML = html;
  panel.classList.add('active');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('active');
  if (network) network.unselectAll();
}
</script>
</body>
</html>
